name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag
          POSTGRES_DB: rag_metadata
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rag -d rag_metadata"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://rag:rag@127.0.0.1:5432/rag_metadata
      REDIS_URL: redis://127.0.0.1:6379
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXTAUTH_SECRET: ci-test-secret-at-least-32-chars-long
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      PINECONE_INDEX_NAME: ${{ secrets.PINECONE_INDEX_NAME }}

    steps:
      - uses: actions/checkout@v4

      # Omit `version`: read exact pnpm from root `packageManager` (avoids
      # "Multiple versions of pnpm specified" vs workflow `version: 9`).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build packages + Next
        run: pnpm build

      - name: Unit tests (Vitest)
        run: pnpm --filter web test
